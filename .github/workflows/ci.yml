name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short
        env:
          ANTCREW_SANDBOX: none   # host Python path doesn't exist inside Docker image

  pypi-compat:
    name: PyPI compat (published wheel)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install published antcrew-engine from PyPI (not editable)
        run: pip install "antcrew-engine[dev]"

      - name: Run tests against installed wheel
        run: python -m pytest tests/ -q --tb=short
        env:
          ANTCREW_SANDBOX: none

  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and security tools
        run: |
          pip install -e ".[dev]"
          pip install "bandit[toml]" pip-audit

      - name: bandit — static security analysis (MEDIUM+)
        # -ll  skip LOW severity   -ii  skip LOW confidence
        run: bandit -r antcrew_engine/ -ll -ii

      - name: pip-audit — dependency CVE scan
        run: pip-audit
